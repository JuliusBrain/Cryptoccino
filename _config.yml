title: Cryptoccino
description: A double shot of crypto before it confirms.
lang: en-GB

url: "https://cryptoccino.xyz"
baseurl: ""

permalink: /:year/:month/:day/

# Privacy-first analytics (Plausible — cookieless, no consent banner). The
# script loads only in production builds AND only when plausible_domain is set,
# so local dev and an unconfigured site stay tracker-free. To enable: create a
# Plausible site for cryptoccino.xyz, then set plausible_domain below.
# Self-hosters / script variants: change plausible_src (e.g. the
# script.outbound-links.js variant to track source-link clicks).
analytics:
  plausible_domain: ""
  plausible_src: "https://plausible.io/js/script.js"

plugins:
  - jekyll-feed
  - jekyll-sitemap

feed:
  path: feed.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: issue

exclude:
  - pipeline/
  - prompts/
  - config/
  - data/
  - tests/
  - requirements.txt
  - requirements-dev.txt
  - pytest.ini
  - CLAUDE.md
  - LICENSE
  - .venv/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock
  - Makefile
  - vendor/
  # TTFs are used only by the Pillow card generator (pipeline/cards.py) at
  # build time — the browser loads the woff2. Keep them out of the published
  # site (~970 KB not served). The woff2 stays.
  - assets/fonts/PTSerif-Regular.ttf
  - assets/fonts/PTSerif-Bold.ttf
  - assets/fonts/JetBrainsMono-Regular.ttf
