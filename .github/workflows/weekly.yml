name: Weekly recap

on:
  # Manual + a weekly schedule. Mondays 08:00 UTC, recapping the week just ended.
  # GitHub cron is best-effort on free public repos; weekly.py is idempotent
  # (skips if this week's recap already exists), so a missed/duplicate run is safe.
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write
  issues: write

jobs:
  recap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build weekly recap
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m pipeline.weekly

      - name: Commit weekly recap
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _weekly/
          if git diff --cached --quiet; then
            echo "No new recap (already exists or none produced); skipping commit."
            exit 0
          fi
          git commit -m "weekly: $(date -u +%Y-%m-%d)"
          git push

      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          gh issue create \
            --title "Weekly recap failed: ${DATE}" \
            --body "The weekly recap run failed. Logs: ${RUN_URL}" \
            || true
