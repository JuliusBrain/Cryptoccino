title: Cryptoccino
description: A double shot of crypto before it confirms.
lang: en-GB

# Populates <author><name> in feed.xml (was empty) so RSS-to-email tools and
# readers show a sender name.
author:
  name: Cryptoccino

url: "https://cryptoccino.xyz"
baseurl: ""

# Newsletter signup (Buttondown). The subscribe form (footer + homepage)
# renders ONLY when username is set, so the site stays clean until it's wired.
# To go live: set this to your Buttondown username (buttondown.com/<username>).
newsletter:
  provider: buttondown
  username: ""

permalink: /:year/:month/:day/

plugins:
  - jekyll-feed

feed:
  path: feed.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: issue

exclude:
  - pipeline/
  - prompts/
  - config/
  - data/
  - tests/
  - requirements.txt
  - requirements-dev.txt
  - pytest.ini
  - CLAUDE.md
  - LICENSE
  - .venv/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock
  - Makefile
  - vendor/
