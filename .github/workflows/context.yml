name: Market context

# Generates the /tv/ "Market Context" blurb with Claude (cheapest model, tiny
# output) every 6 hours and publishes context.json to the `news-data` branch —
# NOT main. The terminal fetches it from raw.githubusercontent.com. Best-effort
# cron; a missed window just leaves the prior blurb.
on:
  workflow_dispatch:
  schedule:
    - cron: "40 */6 * * *"   # every 6h, offset from the digest job (:20)

permissions:
  contents: write

# Serialize with the news rail job: both push to news-data, so never run at the
# same time (avoids a non-fast-forward collision on the shared branch).
concurrency:
  group: news-data-branch
  cancel-in-progress: false

jobs:
  context:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate market context (to /tmp; only written on success)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          COINGECKO_KEY: ${{ secrets.COINGECKO_KEY }}
        run: python -m pipeline.market_context /tmp/context.json

      - name: Publish to the news-data branch
        uses: ./.github/actions/publish-news-data
        with:
          file: /tmp/context.json
          name: context.json
          message-prefix: context
