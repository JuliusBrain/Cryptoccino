name: Daily brew

on:
  # Triggered externally by cron-job.org via workflow_dispatch — GitHub's
  # built-in scheduled runs are best-effort and silently skip on free
  # public repos. The cron-job.org pinger fires this workflow at
  # 03:30 UTC daily (≈ 05:30 Warsaw summer, 04:30 winter — cron-job.org
  # handles the DST translation).
  workflow_dispatch:
  # Backup trigger. GitHub cron is best-effort on free public repos (hence the
  # cron-job.org pinger above), but as a safety net it costs nothing: run.py's
  # first-run-wins guard makes a duplicate same-day trigger a no-op.
  schedule:
    - cron: "30 3 * * *"

permissions:
  contents: write
  issues: write

jobs:
  brew:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # COINGECKO_KEY is optional: the free tier needs no auth, but if a
          # demo key is set it will be sent as x-cg-demo-api-key for higher
          # rate limits.
          COINGECKO_KEY: ${{ secrets.COINGECKO_KEY }}
        run: python -m pipeline.run

      - name: Commit issue and updated DB
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _posts/ data/cryptoccino.db assets/cards assets/data assets/sparklines
          if git diff --cached --quiet; then
            echo "Nothing changed, skipping commit."
            exit 0
          fi
          git commit -m "issue: $(date -u +%Y-%m-%d)"
          git push

      # Dead-man's-switch heartbeat: only pings on a fully successful run, so a
      # crash OR a never-triggered run (cron-job.org stops, GH cron skips) means
      # no ping and the monitor alerts. Optional — skipped unless the
      # HEALTHCHECK_URL secret is set (e.g. a free healthchecks.io check).
      - name: Heartbeat
        if: success()
        env:
          HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}
        run: |
          [ -n "$HEALTHCHECK_URL" ] && curl -fsS --retry 3 "$HEALTHCHECK_URL" || true

      # Make a broken brew loud: open a GitHub issue on any failure. Uses only
      # trusted values (date + run context), never event input.
      - name: Alert on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          DATE="$(date -u +%Y-%m-%d)"
          gh issue create \
            --title "Daily brew failed: ${DATE}" \
            --body "The daily pipeline run failed. Logs: ${RUN_URL}" \
            || true
