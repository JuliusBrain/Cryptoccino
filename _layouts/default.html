<!doctype html>
<html lang="{{ site.lang | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="icon" type="image/svg+xml" href="{{ '/assets/cryptoccino-icon.svg' | relative_url }}">
  <link rel="stylesheet" href="{{ '/assets/style.css' | relative_url }}">

  {%- assign og_image = page.card | default: '/assets/cards/latest.png' -%}
  <meta property="og:title" content="{{ page.title | default: site.title }}">
  <meta property="og:description" content="{{ page.description | default: site.description }}">
  <meta property="og:image" content="{{ og_image | absolute_url }}">
  <meta property="og:type" content="{% if page.layout == 'issue' %}article{% else %}website{% endif %}">
  <meta property="og:url" content="{{ page.url | absolute_url }}">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="{{ page.title | default: site.title }}">
  <meta name="twitter:description" content="{{ page.description | default: site.description }}">
  <meta name="twitter:image" content="{{ og_image | absolute_url }}">

  {% feed_meta %}
</head>
<body>
  <div class="container">
    <header class="site">
      <a class="brand" href="{{ '/' | relative_url }}" aria-label="{{ site.title }}">
        <img src="{{ '/assets/cryptoccino-logo.svg' | relative_url }}" alt="{{ site.title }} — {{ site.description }}">
      </a>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site">
      <span>Brewed daily.</span>
      <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
    </footer>
  </div>
</body>
</html>
