title: Cryptoccino
description: Your daily shot of crypto news
lang: en-GB

# Defaults for the social/link-preview card on the homepage and other non-issue
# pages. Dated issue posts override these from their own front matter. The image
# is the static brand card rendered by scripts/generate_og_card.py.
og_image: /assets/cryptoccino-og.png
og_description: "Your daily shot of crypto. Markets, projects, security, and policy in a five-minute read — brewed every morning."

# Social share handles for the per-section share rows (injected by
# _layouts/default.html). Blank x_handle drops the "via @…"; blank
# substack_notes_url drops the Substack button.
social:
  x_handle: adrianhetman
  substack_notes_url: https://adrianhetman.substack.com/notes

url: "https://cryptoccino.xyz"
baseurl: ""

permalink: /:year/:month/:day/

# Privacy-first analytics (Plausible — cookieless, no consent banner). The
# site-specific script + plausible.init() snippet is emitted in <head> by
# _layouts/default.html, loaded only in production builds (so local dev stays
# tracker-free). To disable, blank out plausible_src.
analytics:
  plausible_src: "https://plausible.io/js/pa-jojvH7oF2cL05TPhwLcuT.js"

plugins:
  - jekyll-feed
  - jekyll-sitemap

feed:
  path: feed.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: issue

exclude:
  - pipeline/
  - prompts/
  - config/
  - data/
  - tests/
  - requirements.txt
  - requirements-dev.txt
  - pytest.ini
  - CLAUDE.md
  - LICENSE
  - .venv/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock
  - Makefile
  - vendor/
  # TTFs are used only by the Pillow card generator (pipeline/cards.py) at
  # build time — the browser loads the woff2. Keep them out of the published
  # site (~970 KB not served). The woff2 stays.
  - assets/fonts/PTSerif-Regular.ttf
  - assets/fonts/PTSerif-Bold.ttf
  - assets/fonts/JetBrainsMono-Regular.ttf
