title: Cryptoccino
description: A double shot of crypto before it confirms.
lang: en-GB

# Populates <author><name> in feed.xml (was empty) so RSS-to-email tools and
# readers show a sender name.
author:
  name: Cryptoccino

url: "https://cryptoccino.xyz"
baseurl: ""

# Newsletter signup. The subscribe form (footer + homepage) renders ONLY when
# form_id is set, so the site stays clean until ConvertKit/Kit is wired up.
# To go live: create a Kit form, then put its numeric form ID here.
newsletter:
  provider: convertkit
  form_id: ""

permalink: /:year/:month/:day/

plugins:
  - jekyll-feed

feed:
  path: feed.xml

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: issue

exclude:
  - pipeline/
  - prompts/
  - config/
  - data/
  - tests/
  - requirements.txt
  - requirements-dev.txt
  - pytest.ini
  - CLAUDE.md
  - LICENSE
  - .venv/
  - .github/
  - README.md
  - Gemfile
  - Gemfile.lock
  - Makefile
  - vendor/
